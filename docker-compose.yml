services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${DB_NAME:-bugshoot}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${DB_PORT:-5432}:5432"

  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:latest}
    environment:
      - OLLAMA_MODEL=${AGENT_OLLAMA_MODEL:-qwen2.5:7b}
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama show $${OLLAMA_MODEL} >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 60
      start_period: 30s
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "ollama serve &
       pid=$$! &&
       until ollama list >/dev/null 2>&1; do sleep 2; done &&
       ollama pull $${OLLAMA_MODEL} &&
       wait $$pid"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - SECRET_KEY=${SECRET_KEY:-django-insecure-dev-key-change-in-production}
      - DEBUG=${DEBUG:-True}
      - DB_ENGINE=postgresql
      - DB_NAME=${DB_NAME:-bugshoot}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_HOST=db
      - DB_PORT=5432
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - CORS_ALLOW_ALL_ORIGINS=${CORS_ALLOW_ALL_ORIGINS:-True}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
      - DJANGO_SUPERUSER_USERNAME=${DJANGO_SUPERUSER_USERNAME:-admin}
      - DJANGO_SUPERUSER_EMAIL=${DJANGO_SUPERUSER_EMAIL:-admin@example.com}
      - DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD:-admin123}
      - LOAD_SAMPLE_DATA=${LOAD_SAMPLE_DATA:-True}
      - AGENT_LLM_TIMEOUT=${AGENT_LLM_TIMEOUT:-300}
      - AGENT_OPENAI_BASE_URL=${AGENT_OPENAI_BASE_URL:-}
      - AGENT_OPENAI_API_KEY=${AGENT_OPENAI_API_KEY:-}
      - AGENT_OPENAI_MODEL=${AGENT_OPENAI_MODEL:-}
      - AGENT_OLLAMA_BASE_URL=${AGENT_OLLAMA_BASE_URL:-http://ollama:11434}
      - AGENT_OLLAMA_MODEL=${AGENT_OLLAMA_MODEL:-qwen2.5:7b}
      - HF_ENDPOINT=${HF_ENDPOINT:-https://hf-mirror.com}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python scripts/init_data.py &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers ${GUNICORN_WORKERS:-1} --timeout ${GUNICORN_TIMEOUT:-600}"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  ollama_data:
